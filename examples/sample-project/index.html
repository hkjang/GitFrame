<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitFrame Sample Target App</title>
  <style>
    body {
      background: radial-gradient(circle at center, #1e1b4b, #0f172a);
      color: #f8fafc;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
    }
    .card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
    }
    h2 {
      margin-top: 0;
      color: #38bdf8;
      font-size: 1.5rem;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 0.85rem;
      margin-bottom: 6px;
      color: #94a3b8;
    }
    input, textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 14px;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      color: #fff;
      font-family: inherit;
    }
    input:focus, textarea:focus {
      border-color: #38bdf8;
      outline: none;
    }
    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #6366f1, #38bdf8);
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      font-size: 0.95rem;
      transition: opacity 0.2s;
    }
    button:hover {
      opacity: 0.9;
    }
    #result-box {
      display: none;
      margin-top: 20px;
      padding: 12px;
      background: rgba(16, 185, 129, 0.15);
      border: 1px solid rgba(16, 185, 129, 0.3);
      border-radius: 8px;
      text-align: center;
      color: #34d399;
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>GitFrame Sample Form</h2>
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Enter username...">
    </div>
    <div class="form-group">
      <label for="message">Message</label>
      <textarea id="message" rows="3" placeholder="Write something..."></textarea>
    </div>
    <button id="submit-btn">Submit Action</button>

    <div id="result-box">
      <strong>🎉 Success!</strong> Welcome, <span id="display-user"></span>!
    </div>
  </div>

  <script>
    document.getElementById('submit-btn').addEventListener('click', () => {
      const username = document.getElementById('username').value || 'Anonymous';
      document.getElementById('display-user').textContent = username;
      document.getElementById('result-box').style.display = 'block';
    });
  </script>
</body>
</html>
